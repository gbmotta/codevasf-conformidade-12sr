# =============================================================================
# Docker Compose — Conformidade Documental Codevasf 12ª SR (intranet)
# =============================================================================
# Sobe o Streamlit na porta host STREAMLIT_PORT (padrão 8502).
# Conecta ao Ollama do host via host.docker.internal.
# Volume opcional REQUERIMENTOS_HOST_PATH para pastas de requerimentos.
# =============================================================================

services:
  analise-conformidade:
    build: .
    container_name: codevasf-conformidade
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT:-8502}:7860"
    env_file:
      - .env
    environment:
      PORT: "7860"
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      CHECKLISTS_PATH: /app/checklists
      UPLOADS_PATH: /app/data/uploads
      HISTORY_PATH: /app/data/history
      OCR_ENGINE: ${OCR_ENGINE:-paddleocr}
      OCR_ALLOW_PADDLE: ${OCR_ALLOW_PADDLE:-1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
    volumes:
      - uploads_data:/app/data/uploads
      - history_data:/app/data/history
      # Opcional: pastas de requerimentos no share (somente leitura)
      - ${REQUERIMENTOS_HOST_PATH:-./data}:/requerimentos:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  uploads_data:
  history_data:
